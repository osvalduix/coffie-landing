<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="images/fav.ico">
  <link rel="stylesheet" href="styles/main.css">
  <title>Coffee Sauce</title>
</head>

<body class="body">
<header class="header">
  <div class="header__nav-left">
    <button class="header__button">GO BACK</button>
    <a href="#" class="header__nav_list">STORY</a>
    <a href="#" class="header__nav_list">SHOP</a>
  </div>
  <img class="header__nav_logo" src="images/logo.svg" alt="Hot Coffee Sauce Logo">
  <div class="header__nav-right">
    <a href="#" class="header__nav_list">CONTACT</a>
    <a href="#" class="header__nav_list">WHOSALE</a>
    <button class="header__button">CLONE</button>
  </div>
</header>
<main>
  <section class="hero">
    <div class="hero__left">
      <div class="hero__first">
        <img class="hero__first-bg" src="images/hero__first-back.svg" alt="first-back">
        <img class="hero__first-top" src="images/hero__first-front.svg" alt="first-front">
      </div>
      <div class="ticker">
        <div class="ticker_track">
          <div class="ticker_papertext">
            <img class="ticker_paper" src="images/ticker-paper.svg" alt="first-front">
            <div class="ticker_text">PUT SOME FIRE IN YOUR BELLY</div>
          </div>
          <div class="ticker_papertext">
            <img class="ticker_paper" src="images/ticker-paper.svg" alt="first-front">
            <div class="ticker_text">PUT SOME FIRE IN YOUR BELLY</div>
          </div>
          <div class="ticker_papertext">
            <img class="ticker_paper" src="images/ticker-paper.svg" alt="first-front">
            <div class="ticker_text">PUT SOME FIRE IN YOUR BELLY</div>
          </div>
        </div>
      </div>
      <div class="hero__second">
        <img class="hero__second-image" src="images/hero-second-image.jpg" alt="Тут нужна картинка">
      </div>
    </div>
    <div class="hero__right">
      <div class="hero__third">THE FIRST HOT SAUCE MADE FOR COFFEE</div>
      <div class="hero__fourth">
        <img class="hero__fourth-image" src="images/hero-fourth-image.jpg" alt="Тут нужна картинка">
      </div>
    </div>
  </section>
  <section class="scorpions">
    <div class="scorpions__inside">
      <img class="scorpions__image-left" src="images/scorpion.svg" alt="scorpion-image">
      <div class="scorpions__text">THROW SOME LAVA IN YOUR JAVA</div>
      <img class="scorpions__image-right" src="images/scorpion.svg" alt="scorpion-image">
    </div>
  </section>
  <section class="bottles">
    <div class="bottles__fires">
      <img class="bottles__fires-small" src="images/bottles-fire-small.svg" alt="Fire Small">
      <img class="bottles__fires-large" src="images/bottles-fire-large.svg" alt="Fire Large">
      <img class="bottles__fires-small" src="images/bottles-fire-small.svg" alt="Fire Small">
      <img class="bottles__fires-large" src="images/bottles-fire-large.svg" alt="Fire Large">
    </div>
    <div class="bottles__greens">
      <div class="bottles__greens-item">
        <img class="bottles__greens-bottle-first" src="images/bottle-image1.jpg" alt="Bottle 1">
        <img class="bottles__greens-image" src="images/bottles-greens.svg" alt="Green Back">
      </div>
      <div class="bottles__greens-item">
        <img class="bottles__greens-bottle-first" src="images/bottle-image2.jpg" alt="Bottle 1">
        <img class="bottles__greens-image" src="images/bottles-greens.svg" alt="Green Back">
      </div>
      <div class="bottles__greens-item">
        <img class="bottles__greens-bottle-first" src="images/bottle-image3.jpg" alt="Bottle 1">
        <img class="bottles__greens-image" src="images/bottles-greens.svg" alt="Green Back">
      </div>
    </div>
  </section>
</main>
</body>

</html>
